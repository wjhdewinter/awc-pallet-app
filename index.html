<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trailer Planner V3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: sans-serif; color: var(--text); display: flex; flex-direction: column;
        }

        .trailer-section {
            background: var(--card); padding: 12px; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .zending-input {
            width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px;
            border: 1px solid var(--border); background: #000; color: #fff; font-weight: bold;
        }

        /* TRAILER GRID */
        .trailer-bed {
            width: 100%; height: 90px; border: 2px solid #94a3b8; border-radius: 4px;
            background: #000; display: flex; flex-direction: column; 
            padding: 2px; overflow: hidden; gap: 2px;
        }
        .lane { display: flex; flex: 1; gap: 2px; width: 100%; }
        .p-block {
            height: 100%; background: var(--accent); border: 1px solid white;
            transition: width 0.2s;
        }

        .stats { display: flex; justify-content: space-between; margin: 8px 0; font-weight: bold; font-size: 0.85rem; }
        .mode-select { display: flex; gap: 15px; font-size: 0.8rem; font-weight: bold; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; margin-bottom: 6px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
        }
        .name { font-weight: bold; font-size: 0.85rem; }
        input[type="number"] {
            width: 55px; height: 38px; border: 1px solid var(--border);
            border-radius: 6px; text-align: center; font-size: 1rem;
            background: #000; color: white;
        }

        footer { padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; margin-bottom: 6px; font-size: 1rem; }
        .btn-wa { background: var(--wa); }
    </style>
</head>
<body>

<div class="trailer-section">
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Ritnummer...">
    <div class="trailer-bed" id="trailer-visual">
        </div>
    <div class="stats">
        <span>LM: <span id="lm-display">0,00</span></span>
        <span>KG: <span id="kg-display">0</span></span>
        <span>Vulling: <span id="perc-display">0</span>%</span>
    </div>
    <div class="mode-select">
        <label style="display:flex; align-items:center; gap:5px;"><input type="radio" name="mode" value="lengte" checked onchange="calc()"> 3 NAAST ELKAAR (Lengte)</label>
        <label style="display:flex; align-items:center; gap:5px;"><input type="radio" name="mode" value="breedte" onchange="calc()"> 2 NAAST ELKAAR (Breedte)</label>
    </div>
    <div style="margin-top:8px;"><label><input type="checkbox" id="stack" onchange="calc()"> <b>STAPELBAAR (Gedeeld door 2)</b></label></div>
</div>

<div class="scroll-area" id="pallet-list">
    <div class="pallet-row" data-name="Mini"> <span class="name">Mini (80x60)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.20" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
    <div class="pallet-row" data-name="Euro"> <span class="name">Euro (80x120)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.40" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
    <div class="pallet-row" data-name="Blok"> <span class="name">Blok (100x100)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.42" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
    <div class="pallet-row" data-name="Indu"> <span class="name">Indu (100x120)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.50" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
    <div class="pallet-row" data-name="Mid"> <span class="name">Mid (140x80)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.47" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
    <div class="pallet-row" data-name="Lang"> <span class="name">Lang (200x80)</span> <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.67" oninput="calc()"><input type="number" class="w" oninput="calc()"></div> </div>
</div>

<footer>
    <button class="btn btn-wa" onclick="sendWA()">STUUR WHATSAPP OVERZICHT</button>
    <button class="btn" style="background:#475569" onclick="location.reload()">RESET</button>
</footer>

<script>
    function calc() {
        let lm = 0, kg = 0;
        let pallets = [];
        const mode = document.querySelector('input[name="mode"]:checked').value;
        const numLanes = (mode === 'lengte') ? 3 : 2;
        
        // Bereken totalen en verzamel pallets
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = parseInt(row.querySelector('.qty').value) || 0;
            const f = parseFloat(row.querySelector('.qty').dataset.f);
            const w = parseFloat(row.querySelector('.w').value) || 0;
            lm += (q * f);
            kg += (q * w);
            for(let i=0; i<q; i++) pallets.push(f);
        });

        if (document.getElementById('stack').checked) lm /= 2;

        // Update tekstuele stats
        const p = (lm / 13.6) * 100;
        document.getElementById('lm-display').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('kg-display').innerText = Math.round(kg);
        document.getElementById('perc-display').innerText = Math.round(p);

        // Teken Trailer Visueel
        const visual = document.getElementById('trailer-visual');
        visual.innerHTML = '';
        
        // Maak banen aan (2 of 3)
        let lanes = [];
        for(let i=0; i<numLanes; i++) {
            let l = document.createElement('div');
            l.className = 'lane';
            visual.appendChild(l);
            lanes.push(l);
        }

        // Verdeel pallets over banen
        pallets.forEach((f, index) => {
            let laneIndex = index % numLanes;
            let block = document.createElement('div');
            block.className = 'p-block';
            // De breedte van het blokje is de factor * aantal banen (omdat ze naast elkaar staan)
            let visualWidth = (f / 13.6) * 100 * numLanes;
            block.style.width = visualWidth + "%";
            lanes[laneIndex].appendChild(block);
        });

        visual.style.borderColor = p > 100 ? "var(--danger)" : "#94a3b8";
    }

    function sendWA() {
        const zn = document.getElementById('zending').value || "Geen nr";
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let detail = "";
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = row.querySelector('.qty').value;
            if(q > 0) detail += `- ${q}x ${row.dataset.name}%0A`;
        });

        let t = `*TRAILER PLANNING*%0A%0A*Zending:* ${zn}%0A*Methode:* ${mode === 'lengte' ? '3 naast elkaar' : '2 naast elkaar'}%0A*Lading:*%0A${detail}%0A*Totaal:*%0A- ${document.getElementById('lm-display').innerText} LM%0A- ${document.getElementById('kg-display').innerText} KG`;
        window.open(`https://wa.me/?text=${t}`);
    }
</script>
</body>
</html>
