<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v2.4</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }

        .header { background: var(--card); padding: 12px; border-bottom: 2px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-switch { background: #000; border: 1px solid var(--border); color: #fff; padding: 5px; border-radius: 6px; font-weight: bold; }
        
        .zending-input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; 
            border: 2px solid var(--border); background: #000; color: #fff; 
            font-size: 1rem; font-weight: bold; outline: none;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; }
        .stat-lbl { font-size: 0.55rem; text-transform: uppercase; color: #94a3b8; }

        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 15px 0; border-radius: 6px; border: 1px solid #444; }
        #trailer-canvas { height: 120px; width: 680px; background: #111; position: relative; border-right: 12px solid #334155; margin: 0 15px; }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.8); font-size: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 2px; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 12px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .p-info b { display: block; font-size: 0.9rem; }
        .p-info span { font-size: 0.65rem; color: #94a3b8; }
        
        .input-group { display: flex; gap: 6px; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; }
        .input-wrapper label { font-size: 0.55rem; margin-bottom: 3px; color: #94a3b8; }
        input[type="number"] { width: 65px; height: 45px; background: #000; color: #fff; border: 2px solid var(--border); border-radius: 8px; text-align: center; font-size: 1.1rem; font-weight: bold; }

        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-reset { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); font-weight: bold; border-radius: 6px; padding: 8px 15px; }
        .btn-wa { width: 100%; padding: 16px; background: var(--wa); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 0 #15803d; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div style="font-weight: 900; font-size: 0.9rem;">WAREHOUSE MASTER</div>
        <select class="lang-switch" id="lang" onchange="initApp()">
            <option value="nl">🇳🇱 NL</option>
            <option value="en">🇬🇧 EN</option>
        </select>
    </div>
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Ritnummer...">
    <div class="stats-grid">
        <div class="stat-box" style="border-color: var(--wa);"><span class="stat-lbl" id="lbl-lm">Laadmeters</span><span id="lm-out" class="stat-val" style="color: var(--wa);">0,00</span></div>
        <div class="stat-box" style="border-color: var(--accent);"><span class="stat-lbl" id="lbl-kg">Totaal KG</span><span id="kg-out" class="stat-val" style="color: var(--accent);">0</span></div>
        <div class="stat-box"><span class="stat-lbl" id="lbl-perc">Trailer %</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll"><div id="trailer-canvas"></div></div>
</div>

<div class="scroll-area" id="pallet-list"></div>

<footer>
    <div class="footer-top">
        <label style="display:flex; align-items:center; gap:10px; font-weight:bold; font-size: 0.8rem;">
            <input type="checkbox" id="stack" onchange="calc()" style="width:20px; height:20px;"> <span id="lbl-stack">STAPELEN</span>
        </label>
        <button class="btn-reset" id="lbl-reset" onclick="resetAll()">RESET</button>
    </div>
    <button class="btn-wa" id="lbl-wa" onclick="sendWA()">VERSTUUR WHATSAPP</button>
</footer>

<script>
    const translations = {
        nl: { lm: "Laadmeters", kg: "Totaal KG", perc: "Trailer %", stack: "STAPELEN", reset: "RESET", wa: "VERSTUUR WHATSAPP", placeholder: "Zending / Ritnummer...", qty: "AANTAL", kg_unit: "KG", pallets: [
            { name: "Europallet", sub: "80x120 (3 n.e.)", label: "EURO", w: 80, l: 120, c: "#3b82f6" },
            { name: "Blokpallet", sub: "120x100 (2 n.e.)", label: "BLOK", w: 120, l: 100, c: "#f59e0b" },
            { name: "Middel", sub: "80x140 (3 n.e.)", label: "MID", w: 80, l: 140, c: "#10b981" },
            { name: "Lang", sub: "80x200 (3 n.e.)", label: "LANG", w: 80, l: 200, c: "#ef4444" }
        ]},
        en: { lm: "Load Meters", kg: "Total KG", perc: "Trailer %", stack: "STACKABLE", reset: "RESET", wa: "SEND WHATSAPP", placeholder: "Shipment No...", qty: "QTY", kg_unit: "KG", pallets: [
            { name: "Euro Pallet", sub: "80x120 (3 a.s.)", label: "EURO", w: 80, l: 120, c: "#3b82f6" },
            { name: "Block Pallet", sub: "120x100 (2 a.s.)", label: "BLOCK", w: 120, l: 100, c: "#f59e0b" },
            { name: "Medium", sub: "80x140 (3 a.s.)", label: "MID", w: 80, l: 140, c: "#10b981" },
            { name: "Long", sub: "80x200 (3 a.s.)", label: "LONG", w: 80, l: 200, c: "#ef4444" }
        ]}
    };

    function initApp() {
        const l = document.getElementById('lang').value;
        const t = translations[l];
        document.getElementById('lbl-lm').innerText = t.lm;
        document.getElementById('lbl-kg').innerText = t.kg;
        document.getElementById('lbl-perc').innerText = t.perc;
        document.getElementById('lbl-stack').innerText = t.stack;
        document.getElementById('lbl-reset').innerText = t.reset;
        document.getElementById('lbl-wa').innerText = t.wa;
        document.getElementById('zending').placeholder = t.placeholder;

        const list = document.getElementById('pallet-list');
        list.innerHTML = t.pallets.map(p => `
            <div class="p-card" data-name="${p.label}" data-w="${p.w}" data-l="${p.l}" data-color="${p.c}">
                <div class="p-info"><b>${p.name}</b><span>${p.sub}</span></div>
                <div class="input-group">
                    <div class="input-wrapper"><label>${t.qty}</label><input type="number" class="qty" placeholder="0" oninput="calc()"></div>
                    <div class="input-wrapper"><label>${t.kg_unit}</label><input type="number" class="kg" placeholder="0" oninput="calc()"></div>
                </div>
            </div>`).join('');
        calc();
    }

        canvas.innerHTML = '';
