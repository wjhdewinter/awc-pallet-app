<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laadmeter Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Laadmeter">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1554/1554401.png">

    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --bg: #f1f5f9;
        }

        /* Fullpage instellingen */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: var(--bg); font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; /* Voorkomt scrollen van de hele pagina */
        }

        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            max-width: 500px; margin: 0 auto;
            background: white;
        }

        header {
            background: var(--primary); color: white;
            padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem;
        }

        .scroll-area {
            flex: 1; overflow-y: auto; padding: 20px;
        }

        .pallet-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; margin-bottom: 10px;
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
        }

        .info { display: flex; flex-direction: column; }
        .name { font-weight: 700; color: #334155; }
        .dims { font-size: 0.8rem; color: #64748b; }

        input[type="number"] {
            width: 80px; height: 45px; border: 2px solid #cbd5e1;
            border-radius: 8px; text-align: center; font-size: 1.1rem; font-weight: bold;
        }

        input:focus { border-color: var(--accent); outline: none; background: #eff6ff; }

        .sticky-footer {
            background: white; border-top: 1px solid #e2e8f0;
            padding: 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .stapel-check {
            display: flex; align-items: center; margin-bottom: 15px;
            font-weight: 600; color: #475569; gap: 10px;
        }

        .result-box {
            background: var(--accent); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
        }

        .total-val { font-size: 2rem; font-weight: 800; display: block; }
        
        /* Checkbox styling */
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <header>Laadmeter Calculator</header>

    <div class="scroll-area">
        <div class="pallet-card">
            <div class="info"><span class="name">Mini Pallet</span><span class="dims">80 x 60 cm</span></div>
            <input type="number" data-factor="0.20" value="0" min="0" oninput="calc()">
        </div>
        <div class="pallet-card">
            <div class="info"><span class="name">Europallet</span><span class="dims">80 x 120 cm</span></div>
            <input type="number" data-factor="0.40" value="0" min="0" oninput="calc()">
        </div>
        <div class="pallet-card">
            <div class="info"><span class="name">Blokpallet</span><span class="dims">100 x 100 cm</span></div>
            <input type="number" data-factor="0.42" value="0" min="0" oninput="calc()">
        </div>
        <div class="pallet-card">
            <div class="info"><span class="name">Industrie / LPR</span><span class="dims">100 x 120 cm</span></div>
            <input type="number" data-factor="0.50" value="0" min="0" oninput="calc()">
        </div>
        <div class="pallet-card">
            <div class="info"><span class="name">Middel Pallet</span><span class="dims">140 x 80 cm</span></div>
            <input type="number" data-factor="0.47" value="0" min="0" oninput="calc()">
        </div>
        <div class="pallet-card">
            <div class="info"><span class="name">Lange Pallet</span><span class="dims">200 x 80 cm</span></div>
            <input type="number" data-factor="0.67" value="0" min="0" oninput="calc()">
        </div>
    </div>

    <div class="sticky-footer">
        <label class="stapel-check">
            <input type="checkbox" id="stack" onchange="calc()"> Stapelbaar (x2)
        </label>
        <div class="result-box">
            <span style="opacity: 0.9; font-size: 0.9rem;">Totaal laadmeters:</span>
            <span class="total-val" id="total">0,00 m¹</span>
        </div>
    </div>
</div>

<script>
    function calc() {
        const inputs = document.querySelectorAll('input[type="number"]');
        const isStackable = document.getElementById('stack').checked;
        let total = 0;

        inputs.forEach(i => {
            const count = parseFloat(i.value) || 0;
            const factor = parseFloat(i.dataset.factor);
            total += (count * factor);
        });

        if (isStackable) total = total / 2;
        document.getElementById('total').innerText = total.toFixed(2).replace('.', ',') + " m¹";
    }
</script>

</body>
</html>
