<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trailer Planner Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: sans-serif; color: var(--text); display: flex; flex-direction: column;
        }

        /* TRAILER VISUAL MET PALLETS */
        .trailer-section {
            background: var(--card); padding: 15px; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .zending-input {
            width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px;
            border: 1px solid var(--border); background: #000; color: #fff; font-weight: bold;
        }
        .trailer-bed {
            width: 100%; height: 80px; border: 3px solid #94a3b8; border-radius: 4px;
            position: relative; background: #000; overflow: hidden;
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 2px; padding: 2px;
        }
        .visual-pallet {
            height: 35px; background: var(--accent); border: 1px solid white;
            border-radius: 2px; flex-shrink: 0;
        }
        .over-limit { background: var(--danger) !important; }

        .stats { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; margin-bottom: 8px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
        }
        .name { font-weight: bold; font-size: 0.9rem; }
        input[type="number"] {
            width: 60px; height: 40px; border: 1px solid var(--border);
            border-radius: 6px; text-align: center; font-size: 1.1rem;
            background: #000; color: white; font-weight: bold;
        }

        .footer { padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 1rem; cursor: pointer; }
        .btn-wa { background: var(--wa); margin-bottom: 8px; }
        .btn-clear { background: #475569; padding: 10px; }
    </style>
</head>
<body>

<div class="trailer-section">
    <input type="text" id="zending" class="zending-input" placeholder="Zendingnummer / Referentie...">
    <div class="trailer-bed" id="trailer-visual">
        </div>
    <div class="stats">
        <span>LM: <span id="lm-display">0,00</span></span>
        <span>KG: <span id="kg-display">0</span></span>
        <span>Vulling: <span id="perc-display">0</span>%</span>
    </div>
    <div style="margin-top:8px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="stack" onchange="calc()" style="width:20px; height:20px;"> <b>STAPELBAAR</b>
    </div>
</div>

<div class="scroll-area">
    <div class="pallet-row" data-name="Mini Pallet">
        <div class="name">Mini (80x60)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.20" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Europallet">
        <div class="name">Euro (80x120)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.40" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Blokpallet">
        <div class="name">Blok (100x100)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.42" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Industriepallet">
        <div class="name">Indu (100x120)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.50" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Middel pallet">
        <div class="name">Mid (140x80)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.47" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Lange pallet">
        <div class="name">Lang (200x80)</div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.67" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
</div>

<div class="footer">
    <button class="btn btn-wa" onclick="sendWA()">VERSTUUR WHATSAPP</button>
    <button class="btn btn-clear" onclick="location.reload()">RESET APP</button>
</div>

<script>
    function calc() {
        let lm = 0, kg = 0;
        const visual = document.getElementById('trailer-visual');
        visual.innerHTML = '';
        
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = parseInt(row.querySelector('.qty').value) || 0;
            const f = parseFloat(row.querySelector('.qty').dataset.f);
            const w = parseFloat(row.querySelector('.w').value) || 0;
            
            lm += (q * f);
            kg += (q * w);

            // Voeg visuele pallets toe
            for(let i=0; i<q; i++) {
                let p = document.createElement('div');
                p.className = 'visual-pallet';
                p.style.width = (f * 7) + "%"; // Schaal voor trailerbeeld
                visual.appendChild(p);
            }
        });

        if (document.getElementById('stack').checked) lm /= 2;
        
        const p = (lm / 13.6) * 100;
        document.getElementById('lm-display').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('kg-display').innerText = Math.round(kg);
        document.getElementById('perc-display').innerText = Math.round(p);
        
        if(p > 100) visual.classList.add('over-limit');
        else visual.classList.remove('over-limit');
    }

    function sendWA() {
        const zn = document.getElementById('zending').value || "Geen nummer";
        let detail = "";
        
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = row.querySelector('.qty').value;
            if(q > 0) {
                detail += `- ${q}x ${row.dataset.name}%0A`;
            }
        });

        const lm = document.getElementById('lm-display').innerText;
        const kg = document.getElementById('kg-display').innerText;
        const st = document.getElementById('stack').checked ? "Ja" : "Nee";

        let t = `*LADING OVERZICHT*%0A%0A`;
        t += `*Zending:* ${zn}%0A`;
        t += `*Pallets:*%0A${detail}%0A`;
        t += `*Totaal:*%0A- Laadmeter: ${lm} m¹%0A- Gewicht: ${kg} kg%0A- Stapelbaar: ${st}`;
        
        window.open(`https://wa.me/?text=${t}`);
    }
</script>
</body>
</html>
