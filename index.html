<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trailer Loader</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: sans-serif; color: var(--text); display: flex; flex-direction: column;
        }

        /* TRAILER VISUALISATIE */
        .trailer-container {
            background: var(--card); padding: 15px; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .trailer-bed {
            width: 100%; height: 60px; border: 3px solid #94a3b8; border-radius: 4px;
            position: relative; background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .trailer-fill {
            position: absolute; left: 0; top: 0; bottom: 0;
            background: linear-gradient(90deg, #1d4ed8, var(--accent));
            width: 0%; transition: width 0.5s ease; border-right: 2px solid white;
        }
        .trailer-label { position: relative; z-index: 2; font-weight: 900; font-size: 1.2rem; text-shadow: 1px 1px 4px #000; }
        
        .stats-bar { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; margin-bottom: 8px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
        }
        .name { font-weight: bold; font-size: 0.9rem; }
        input {
            width: 65px; height: 40px; border: 1px solid var(--border);
            border-radius: 6px; text-align: center; font-size: 1.1rem;
            background: #000; color: white; font-weight: bold;
        }

        .footer-actions { padding: 10px; display: flex; gap: 10px; background: var(--card); }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 1rem; }
        .btn-wa { background: #25d366; }
        .btn-clear { background: #475569; }
    </style>
</head>
<body>

<div class="trailer-container">
    <div class="trailer-bed">
        <div id="fill" class="trailer-fill"></div>
        <div class="trailer-label"><span id="lm-display">0,00</span> m¹</div>
    </div>
    <div class="stats-bar">
        <span>Kilo: <span id="kg-display">0</span></span>
        <span>Vulling: <span id="perc-display">0</span>%</span>
    </div>
    <div style="margin-top:10px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="stack" onchange="calc()" style="width:20px; height:20px;"> <b>GOEDEREN STAPELBAAR</b>
    </div>
</div>

<div class="scroll-area">
    <div class="pallet-row">
        <div class="info"><div class="name">Mini (80x60)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.20" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
    <div class="pallet-row">
        <div class="info"><div class="name">Euro (80x120)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.40" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
    <div class="pallet-row">
        <div class="info"><div class="name">Blok (100x100)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.42" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
    <div class="pallet-row">
        <div class="info"><div class="name">Indu (100x120)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.50" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
    <div class="pallet-row">
        <div class="info"><div class="name">Mid (140x80)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.47" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
    <div class="pallet-row">
        <div class="info"><div class="name">Lang (200x80)</div></div>
        <div style="display:flex; gap:5px;"><input type="number" class="qty" data-f="0.67" oninput="calc()" placeholder="st"><input type="number" class="w" oninput="calc()" placeholder="kg"></div>
    </div>
</div>

<div class="footer-actions">
    <button class="btn btn-clear" onclick="location.reload()">WISSEN</button>
    <button class="btn btn-wa" onclick="sendWA()">WHATSAPP</button>
</div>

<script>
    function calc() {
        let lm = 0, kg = 0;
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const f = parseFloat(row.querySelector('.qty').dataset.f);
            const w = parseFloat(row.querySelector('.w').value) || 0;
            lm += (q * f); kg += (q * w);
        });

        if (document.getElementById('stack').checked) lm /= 2;

        const p = (lm / 13.6) * 100;
        document.getElementById('lm-display').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('kg-display').innerText = Math.round(kg);
        document.getElementById('perc-display').innerText = Math.round(p);
        
        const fill = document.getElementById('fill');
        fill.style.width = Math.min(p, 100) + "%";
        fill.style.background = p > 100 ? "var(--danger)" : "linear-gradient(90deg, #1d4ed8, var(--accent))";
    }

    function sendWA() {
        let t = `*Trailer Loading*%0ALaadmeter: ${document.getElementById('lm-display').innerText} m¹%0AGewicht: ${document.getElementById('kg-display').innerText} kg%0AVulling: ${document.getElementById('perc-display').innerText}%`;
        window.open(`https://wa.me/?text=${t}`);
    }
</script>
</body>
</html>
