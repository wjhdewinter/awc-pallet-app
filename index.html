<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Precision V5</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #475569; --accent: #3b82f6; --wa: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--card); padding: 10px; border-bottom: 2px solid var(--border); }
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 15px 0; border-top: 2px solid #94a3b8; border-bottom: 2px solid #94a3b8; margin: 10px 0; }
        #trailer-canvas { 
            height: 120px; /* 240cm / 2 */
            width: 680px;  /* 1360cm / 2 */
            background: #111; position: relative; border-right: 8px solid #334155; margin: 0 15px;
        }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.7); font-size: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-shadow: 1px 1px 1px #000; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 5px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; color: #fff; }
        .stat-lbl { font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .zending-input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: #fff; font-weight: bold; }
        
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .p-grid { display: grid; grid-template-columns: 1.2fr 1.5fr 1fr; gap: 10px; align-items: center; }
        input, select { width: 100%; height: 40px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        
        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .btn-wa { width: 100%; padding: 15px; background: var(--wa); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 0 #15803d; }
        .btn-wa:active { transform: translateY(2px); box-shadow: 0 2px 0 #15803d; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Ritnummer...">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Meters</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Gewicht</span><span id="kg-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll">
        <div id="trailer-canvas"></div>
    </div>
</div>

<div class="scroll-area">
    <div class="p-card" data-name="Euro" data-w="80" data-h="120" data-color="#3b82f6">
        <div style="margin-bottom:8px;"><b>Europallet (80x120)</b></div>
        <div class="p-grid">
            <input type="number" class="qty" placeholder="Stuks" oninput="calc()">
            <select class="mode" onchange="calc()"><option value="b">Breedte (3 n.e.)</option><option value="l">Lengte (2 n.e.)</option></select>
            <input type="number" class="kg" placeholder="Kg" oninput="calc()">
        </div>
    </div>

    <div class="p-card" data-name="Blok" data-w="100" data-h="120" data-color="#f59e0b">
        <div style="margin-bottom:8px;"><b>Blokpallet (100x120)</b></div>
        <div class="p-grid">
            <input type="number" class="qty" placeholder="Stuks" oninput="calc()">
            <select class="mode" onchange="calc()"><option value="l">Lengte (2 n.e.)</option><option value="b">Breedte (2 n.e.)</option></select>
            <input type="number" class="kg" placeholder="Kg" oninput="calc()">
        </div>
    </div>

    <div class="p-card" data-name="Mini" data-w="60" data-h="80" data-color="#10b981">
        <div style="margin-bottom:8px;"><b>Mini (60x80)</b></div>
        <div class="p-grid">
            <input type="number" class="qty" placeholder="Stuks" oninput="calc()">
            <select class="mode" onchange="calc()"><option value="l">Lengte (4 n.e.)</option><option value="b">Breedte (3 n.e.)</option></select>
            <input type="number" class="kg" placeholder="Kg" oninput="calc()">
        </div>
    </div>

    <div class="p-card" data-name="Lang" data-w="200" data-h="80" data-color="#ef4444">
        <div style="margin-bottom:8px;"><b>Lange Pallet (200x80)</b></div>
        <div class="p-grid">
            <input type="number" class="qty" placeholder="Stuks" oninput="calc()">
            <select class="mode" onchange="calc()"><option value="b">Breedte (3 n.e.)</option><option value="l">Lengte (1 n.e.)</option></select>
            <input type="number" class="kg" placeholder="Kg" oninput="calc()">
        </div>
    </div>
</div>

<footer>
    <div style="margin-bottom:10px;"><label style="display:flex; align-items:center; gap:10px;"><input type="checkbox" id="stack" onchange="calc()" style="width:22px; height:22px;"> <b>GOEDEREN ZIJN STAPELBAAR</b></label></div>
    <button class="btn-wa" onclick="sendWA()">STUUR WHATSAPP</button>
</footer>

<script>
    function calc() {
        const canvas = document.getElementById('trailer-canvas');
        canvas.innerHTML = '';
        let totalKG = 0, currentX = 0, currentY = 0, rowMaxX = 0;
        const SCALE = 0.5; // 1cm = 0.5px
        const T_WIDTH = 240;

        document.querySelectorAll('.p-card').forEach(card => {
            const qty = parseInt(card.querySelector('.qty').value) || 0;
            const mode = card.querySelector('.mode').value;
            const kg = parseFloat(card.querySelector('.kg').value) || 0;
            const color = card.dataset.color;
            
            let pW = parseInt(card.dataset.w); 
            let pH = parseInt(card.dataset.h); 
            if(mode === 'b') { [pW, pH] = [pH, pW]; }

            totalKG += (qty * kg);

            for(let i=0; i<qty; i++) {
                if(currentY + pW > T_WIDTH) {
                    currentY = 0;
                    currentX += rowMaxX;
                    rowMaxX = 0;
                }

                let div = document.createElement('div');
                div.className = 'v-pallet';
                div.style.left = (currentX * SCALE) + "px";
                div.style.top = (currentY * SCALE) + "px";
                div.style.width = (pH * SCALE) + "px";
                div.style.height = (pW * SCALE) + "px";
                div.style.backgroundColor = color;
                div.innerText = card.dataset.name.substring(0,2);
                canvas.appendChild(div);

                currentY += pW;
                if(pH > rowMaxX) rowMaxX = pH;
            }
        });

        let finalLM = (currentX + rowMaxX) / 100;
        if(document.getElementById('stack').checked) finalLM /= 2;

        document.getElementById('lm-out').innerText = finalLM.toFixed(2).replace('.', ',');
        document.getElementById('kg-out').innerText = Math.round(totalKG);
        document.getElementById('perc-out').innerText = Math.round((finalLM / 13.6) * 100) + "%";
    }

    function sendWA() {
        const zn = document.getElementById('zending').value || "Geen";
        let list = "";
        document.querySelectorAll('.p-card').forEach(c => {
            const q = c.querySelector('.qty').value;
            if(q > 0) list += `- ${q}x ${c.dataset.name} (${c.querySelector('.mode').selectedOptions[0].text})%0A`;
        });
        let t = `*LADING OVERZICHT*%0A%0A*Zending:* ${zn}%0A*Lading:*%0A${list}%0A*Totaal:*%0A- LM: ${document.getElementById('lm-out').innerText}%0A- KG: ${document.getElementById('kg-out').innerText}`;
        window.open(`https://wa.me/?text=${t}`);
    }
</script>
</body>
</html>
