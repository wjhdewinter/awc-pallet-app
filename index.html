<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Master v7.4</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --wa: #22c55e; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--card); padding: 10px; border-bottom: 2px solid #334155; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 8px; }
        .stat-v { font-size: 1.4rem; font-weight: 900; color: var(--wa); display: block; }
        
        /* De trailer bak */
        .trailer-scroll { background: #000; padding: 15px 0; overflow-x: auto; border-radius: 8px; border: 2px solid #444; margin: 0 5px; position: relative; }
        #canvas { 
            height: 120px; 
            width: 680px; /* 1360cm / 2 */
            position: relative; 
            background: #111; 
            border-right: 15px solid #666; /* De achterdeuren */
            background-image: linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            background-size: 50px 100%; /* Hulplijn elke meter */
        }
        
        .v-p { position: absolute; border: 1px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; border-radius: 2px; text-align: center; }
        
        .input-grid { flex: 1; overflow-y: auto; padding: 10px; }
        .p-card { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #334155; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; gap: 8px; }
        .num-box { display: flex; flex-direction: column; align-items: center; flex: 1; }
        input { width: 100%; height: 50px; background: #000; color: #fff; border: 2px solid var(--accent); border-radius: 10px; text-align: center; font-size: 1.6rem; font-weight: 900; }
        label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; font-weight: bold; }
        footer { padding: 12px; background: var(--card); }
        button { width: 100%; padding: 18px; background: var(--wa); color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="stats">
        <div style="text-align:center"><span id="m-out" class="stat-v">0,00</span><span style="font-size:0.6rem">METER</span></div>
        <div style="text-align:center"><span id="p-out" class="stat-v">0</span><span style="font-size:0.6rem">PALLETS</span></div>
    </div>
    <div class="trailer-scroll">
        <div id="canvas"></div>
    </div>
</div>

<div class="input-grid">
    <div class="p-card">
        <b>Euro (80x120)</b>
        <div class="control-row">
            <div class="num-box"><label>80 Br (L)</label><input type="number" id="e_l" value="0" oninput="calc()"></div>
            <div class="num-box"><label>120 Br (B)</label><input type="number" id="e_b" value="0" oninput="calc()"></div>
        </div>
    </div>
    <div class="p-card">
        <b>Blok (100x120)</b>
        <div class="control-row">
            <div class="num-box"><label>100 Br (L)</label><input type="number" id="b_l" value="0" oninput="calc()"></div>
            <div class="num-box"><label>120 Br (B)</label><input type="number" id="b_b" value="0" oninput="calc()"></div>
        </div>
    </div>
    <div class="p-card">
        <b>Middel (80x140)</b>
        <div class="control-row">
            <div class="num-box"><label>80 Br (L)</label><input type="number" id="m_l" value="0" oninput="calc()"></div>
            <div class="num-box"><label>140 Br (B)</label><input type="number" id="m_b" value="0" oninput="calc()"></div>
        </div>
    </div>
    <div class="p-card">
        <b>Lang (80x200)</b>
        <div class="control-row">
            <div class="num-box"><label>80 Br (L)</label><input type="number" id="l_l" value="0" oninput="calc()"></div>
            <div class="num-box"><label>200 Br (B)</label><input type="number" id="l_b" value="0" oninput="calc()"></div>
        </div>
    </div>
</div>

<footer><button onclick="send()">📲 VERSTUUR LAADPLAN</button></footer>

<script>
    function calc() {
        const can = document.getElementById('canvas');
        can.innerHTML = '';
        let x = 0, y = 0, maxL = 0, totalP = 0, pool = [];
        const TW = 240, S = 0.5;

        const getData = (id, w, l, c, label) => {
            let q = parseInt(document.getElementById(id).value) || 0;
            totalP += q;
            for(let i=0; i<q; i++) pool.push({w, l, c, label});
        };

        getData('e_l', 80, 120, '#3b82f6', 'E');
        getData('e_b', 120, 80, '#3b82f6', 'E');
        getData('b_l', 100, 120, '#f59e0b', 'B');
        getData('b_b', 120, 100, '#f59e0b', 'B');
        getData('m_l', 80, 140, '#10b981', 'M');
        getData('m_b', 140, 80, '#10b981', 'M');
        getData('l_l', 80, 200, '#ef4444', 'L');
        getData('l_b', 200, 80, '#ef4444', 'L');

        document.getElementById('p-out').innerText = totalP;
        window.plan = []; let curR = [];

        pool.forEach(p => {
            if (y + p.w > TW) {
                window.plan.push(curR.join(''));
                curR = []; x += maxL; y = 0; maxL = 0;
            }
            const d = document.createElement('div');
            d.className = 'v-p'; 
            d.style.left = (x*S)+'px'; 
            d.style.top = (y*S)+'px';
            d.style.width = (p.l*S)+'px'; 
            d.style.height = (p.w*S)+'px';
            d.style.backgroundColor = p.c; 
            d.innerText = p.label;
            can.appendChild(d);
            curR.push(p.label); 
            y += p.w; 
            if(p.l > maxL) maxL = p.l;
        });

        if(curR.length > 0) window.plan.push(curR.join(''));
        let finalM = ((x + maxL)/100).toFixed(2);
        document.getElementById('m-out').innerText = finalM.replace('.', ',');
    }

    function send() {
        let t = `*🚛 LAADPLAN*\nMeters: ${document.getElementById('m-out').innerText}m\n\n`;
        window.plan.forEach((r, i) => t += `Rij ${i+1}: [${r}]\n`);
        window.open(`https://wa.me/?text=${encodeURIComponent(t)}`);
    }
    window.onload = calc;
</script>
</body>
</html>
