<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v3.8</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #3b82f6; --wa: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--card); padding: 10px; border-bottom: 2px solid var(--border); }
        .zending-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid var(--border); background: #000; color: #fff; font-size: 1rem; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; color: var(--wa); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 20px 0; margin-top: 10px; border-radius: 4px; border: 1px solid var(--border); }
        #trailer-canvas { height: 120px; width: 1500px; background: #111; position: relative; border-right: 15px solid #444; margin-left: 20px; }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.9); font-size: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 2px; text-align: center; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .mode-btn { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
        input[type="number"] { width: 80px; height: 50px; background: #000; color: #fff; border: 2px solid var(--accent); border-radius: 10px; text-align: center; font-size: 1.5rem; font-weight: bold; }
        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .btn-wa { width: 100%; padding: 20px; background: var(--wa); color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; font-size: 0.9rem;">WAREHOUSE MASTER v3.8</div>
    <input type="text" id="zending" class="zending-input" placeholder="Ritnummer / Referentie...">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Meters</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Pallets</span><span id="pal-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll"><div id="trailer-canvas"></div></div>
</div>

<div class="scroll-area">
    <div class="p-card">
        <div><b>Euro</b><br><small style="color:#94a3b8">80x120 (Slimme mix)</small></div>
        <input type="number" id="q-euro" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Blok</b><br><small style="color:#94a3b8">120 breed</small></div>
        <input type="number" id="q-blok" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Middel</b><br><small style="color:#94a3b8">140 breed</small></div>
        <input type="number" id="q-mid" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div>
            <b>Lang (80x200)</b><br>
            <button class="mode-btn" id="lang-mode" onclick="toggleLangMode()">STAND: IN LENGTE</button>
        </div>
        <input type="number" id="q-lang" placeholder="0" oninput="calculate()">
    </div>
</div>

<footer>
    <button class="btn-wa" onclick="sendWA()">
        <span>🚛</span> VERSTUUR VISUEEL LAADPLAN
    </button>
</footer>

<script>
    let langIsLengte = true;
    let currentLayout = []; // Opslag voor visueel bericht

    function toggleLangMode() { langIsLengte = !langIsLengte; document.getElementById('lang-mode').innerText = langIsLengte ? "STAND: IN LENGTE" : "STAND: OVERDWARS"; calculate(); }

    function calculate() {
        const canvas = document.getElementById('trailer-canvas');
        canvas.innerHTML = '';
        currentLayout = [];
        let curX = 0, curY = 0, maxLRow = 0;
        const SCALE = 0.5, T_WIDTH = 240;

        let pool = [];
        const add = (id, q, w, l, c, emoji) => { for(let i=0; i<q; i++) pool.push({id, w, l, c, emoji}); };
        
        add('E', parseInt(document.getElementById('q-euro').value)||0, 80, 120, '#3b82f6', '🟦');
        add('B', parseInt(document.getElementById('q-blok').value)||0, 120, 100, '#f59e0b', '🟧');
        add('M', parseInt(document.getElementById('q-mid').value)||0, 140, 80, '#10b981', '🟩');
        add('L', parseInt(document.getElementById('q-lang').value)||0, langIsLengte?80:200, langIsLengte?200:80, '#ef4444', '🟥');

        document.getElementById('pal-out').innerText = pool.length;

        let currentRow = [];
        while(pool.length > 0) {
            let found = false;
            for(let i=0; i<pool.length; i++) {
                let p = pool[i];
                if (curY + p.w <= T_WIDTH) {
                    drawPallet(canvas, curX, curY, p.w, p.l, p.c, p.id);
                    currentRow.push(p.emoji);
                    curY += p.w;
                    if (p.l > maxLRow) maxLRow = p.l;
                    pool.splice(i, 1);
                    found = true;
                    break;
                }
            }
            if (!found) { 
                currentLayout.push(currentRow.join(' '));
                currentRow = [];
                curY = 0; curX += maxLRow; maxLRow = 0; 
            }
        }
        if(currentRow.length > 0) currentLayout.push(currentRow.join(' '));

        const totalLM = (curX + maxLRow) / 100;
        document.getElementById('lm-out').innerText = totalLM.toFixed(2).replace('.', ',');
        document.getElementById('perc-out').innerText = Math.round((totalLM / 13.6) * 100) + "%";
    }

    function drawPallet(canvas, x, y, w, l, color, text) {
        const d = document.createElement('div');
        d.className = 'v-pallet';
        d.style.left = (x*0.5)+"px"; d.style.top = (y*0.5)+"px";
        d.style.width = (l*0.5)+"px"; d.style.height = (w*0.5)+"px";
        d.style.backgroundColor = color; d.innerText = text;
        canvas.appendChild(d);
    }

    function sendWA() {
        const z = document.getElementById('zending').value || "Geen ritnummer";
        const lm = document.getElementById('lm-out').innerText;
        const pal = document.getElementById('pal-out').innerText;
        
        let msg = `*🚛 VISUEEL LAADPLAN*\n`;
        msg += `*Rit:* ${z}\n`;
        msg += `*Meters:* ${lm} m | *Pallets:* ${pal}\n`;
        msg += `------------------------------------\n\n`;
        msg += `*TRAILER INDELING (Kops naar Achter):*\n`;
        
        // De visuele weergave toevoegen
        currentLayout.forEach((row, index) => {
            msg += `Rij ${index + 1}: [ ${row} ]\n`;
        });

        msg += `\n------------------------------------\n`;
        msg += `🟦=Euro | 🟧=Blok | 🟩=Middel | 🟥=Lang`;

        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
    window.onload = calculate;
</script>
</body>
</html>
