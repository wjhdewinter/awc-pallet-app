<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #22c55e; --border: #334155; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: sans-serif; color: var(--text); display: flex; flex-direction: column;
        }

        /* RESULTATEN BOVENAAN VOOR ZICHTBAARHEID */
        .header-results {
            background: var(--card); padding: 10px 15px; border-bottom: 2px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            position: sticky; top: 0; z-index: 100;
        }
        .res-box { background: var(--accent); padding: 8px; border-radius: 8px; text-align: center; }
        .res-box.blue { background: #3b82f6; }
        .total-val { font-size: 1.4rem; font-weight: 900; display: block; }
        .label { font-size: 0.7rem; font-weight: bold; opacity: 0.9; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; margin-bottom: 8px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
        }
        .info { flex: 1; }
        .name { font-weight: bold; font-size: 0.9rem; display: block; }
        .dims { font-size: 0.7rem; color: #94a3b8; }
        
        .inputs { display: flex; gap: 5px; }
        input {
            width: 60px; height: 40px; border: 1px solid var(--border);
            border-radius: 6px; text-align: center; font-size: 1rem;
            background: #000; color: white; font-weight: bold;
        }

        .capacity-bar { height: 6px; background: #334155; border-radius: 3px; margin: 5px 15px; overflow: hidden; }
        #progress { height: 100%; width: 0%; background: var(--accent); }

        .actions { padding: 10px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.9rem; color: white; cursor: pointer; }
        .btn-wa { background: var(--wa); }
        .btn-reset { background: #ef4444; flex: 0 0 80px; }
        
        .option { display: flex; align-items: center; gap: 10px; padding: 5px 15px; font-size: 0.9rem; }
        input[type="checkbox"] { transform: scale(1.3); }
    </style>
</head>
<body>

<div class="header-results">
    <div class="res-box">
        <span class="label">LAADMETERS</span>
        <span id="total-lm" class="total-val">0,00</span>
    </div>
    <div class="res-box blue">
        <span class="label">TOTAAL KG</span>
        <span id="total-kg" class="total-val">0</span>
    </div>
</div>

<div class="capacity-bar"><div id="progress"></div></div>

<div class="option">
    <input type="checkbox" id="stack" onchange="calc()"> <b>STAPELEN (x2)</b>
</div>

<div class="scroll-area" id="list">
    <div class="pallet-row">
        <div class="info"><span class="name">Mini (80x60)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.20" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
    <div class="pallet-row">
        <div class="info"><span class="name">Euro (80x120)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.40" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
    <div class="pallet-row">
        <div class="info"><span class="name">Blok (100x100)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.42" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
    <div class="pallet-row">
        <div class="info"><span class="name">Indu (100x120)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.50" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
    <div class="pallet-row">
        <div class="info"><span class="name">Mid (140x80)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.47" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
    <div class="pallet-row">
        <div class="info"><span class="name">Lang (200x80)</span><span class="dims">Aantal | Kg p/st</span></div>
        <div class="inputs">
            <input type="number" class="qty" data-f="0.67" oninput="calc()" placeholder="0">
            <input type="number" class="w" oninput="calc()" placeholder="0">
        </div>
    </div>
</div>

<div class="actions">
    <button class="btn btn-reset" onclick="location.reload()">WISSEN</button>
    <button class="btn btn-wa" onclick="sendWA()">WHATSAPP</button>
</div>

<script>
    function calc() {
        let lm = 0, kg = 0;
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const f = parseFloat(row.querySelector('.qty').dataset.f);
            const w = parseFloat(row.querySelector('.w').value) || 0;
            lm += (q * f);
            kg += (q * w);
        });
        if (document.getElementById('stack').checked) lm /= 2;
        document.getElementById('total-lm').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('total-kg').innerText = Math.round(kg);
        document.getElementById('progress').style.width = Math.min((lm / 13.6) * 100, 100) + "%";
    }

    function sendWA() {
        let text = `*Warehouse*%0ALaadmeter: ${document.getElementById('total-lm').innerText} m¹%0AGewicht: ${document.getElementById('total-kg').innerText} kg`;
        window.open(`https://wa.me/?text=${text}`);
    }
</script>
</body>
</html>
