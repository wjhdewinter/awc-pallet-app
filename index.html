<div id="loading-meter-app" style="font-family: sans-serif; max-width: 400px; border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
    <h3 style="margin-top: 0;">Laadmeter Calculator</h3>
    
    <div id="inputs">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Mini pallet (80x60):</label>
            <input type="number" class="p-input" data-factor="0.20" value="0" style="width: 50px;">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Europallet (80x120):</label>
            <input type="number" class="p-input" data-factor="0.40" value="0" style="width: 50px;">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Blokpallet (100x100):</label>
            <input type="number" class="p-input" data-factor="0.42" value="0" style="width: 50px;">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Industrie (100x120):</label>
            <input type="number" class="p-input" data-factor="0.50" value="0" style="width: 50px;">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Lange pallet (200x80):</label>
            <input type="number" class="p-input" data-factor="0.67" value="0" style="width: 50px;">
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <label>Middel (140x80):</label>
            <input type="number" class="p-input" data-factor="0.47" value="0" style="width: 50px;">
        </div>
    </div>

    <div style="margin: 15px 0; padding-top: 10px; border-top: 1px solid #eee;">
        <label><input type="checkbox" id="is-stackable"> Goederen zijn stapelbaar</label>
    </div>

    <div style="background: #f0f7ff; padding: 10px; border-radius: 4px; text-align: center;">
        <strong>Totaal: <span id="total-display">0,00</span> laadmeters</strong>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.p-input');
    const checkbox = document.getElementById('is-stackable');
    const display = document.getElementById('total-display');

    function updateCalculations() {
        let total = 0;
        inputs.forEach(input => {
            const factor = parseFloat(input.dataset.factor);
            const count = parseInt(input.value) || 0;
            total += (count * factor);
        });

        if (checkbox.checked) {
            total = total / 2;
        }

        display.innerText = total.toFixed(2).replace('.', ',');
    }

    inputs.forEach(input => input.addEventListener('input', updateCalculations));
    checkbox.addEventListener('change', updateCalculations);
</script>
